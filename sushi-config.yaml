# Documentation à propos de cette page : https://fshschool.org/docs/sushi/configuration/

id: ans.fhir.fr.annuaire
canonical: https://interop.esante.gouv.fr/ig/fhir/annuaire
name: AnnuaireSante
title: "Annuaire Santé"
description: "Ressources de conformité basées sur le modèle d'exposition de l'Annuaire Santé."
publisher:
  name: Agence du Numérique en Santé (ANS) - 2-10 Rue d'Oradour-sur-Glane, 75015 Paris
  url: https://esante.gouv.fr
  email: monserviceclient.annuaire@esante.gouv.fr
dependencies:
  hl7.fhir.fr.core: 2.1.0
  hl7.fhir.uv.xver-r5.r4: latest
  ans.fr.nos: latest
  hl7.terminology.r4: 5.5.0
status: draft
version: 1.2.0-snapshot
fhirVersion: 4.0.1
copyrightYear: 2020+
# releaseLabel: final-text

releaseLabel: ci-build
jurisdiction: urn:iso:std:iso:3166#FR "France (la)"

parameters: #Parameters list - https://build.fhir.org/ig/FHIR/fhir-tools-ig/CodeSystem-ig-parameters.html
    shownav: 'true'
    path-expansion-params: '../../expansion-params.json' # for using French SNOMED CT Extension
    pin-canonicals: pin-all
    apply-contact: true
    logging:
      - tx #tx: Messages describing the use of the terminology server (for debugging)
      - html #html: Log when validating an html page (troubleshooting only - leave off)
      - generate #generate: Log when producing an individual resource (troubleshooting only - leave off)
      - init #init: Messages describing the start up process (for debugging)
      - progress #progress: Overall progress messages
    i18n-default-lang: fr # Default language
    apply-jurisdiction: true
    i18n-lang:
      - en
    translation-sources:
      - input/translations/en

pages:
    index.md:
        title: Accueil
    liste_profils.md:
        title: Liste des profils par permission
    balmss-options.md:
        title: API MSSanté — Comparatif des options
    balmss-spec.md:
        title: API MSSanté — Spécification
    downloads.md:
        title: Téléchargement du guide
    problematiques_connues.md:
        title: Problématiques connues
    changes.md:
        title: Historique des changements
    translationinfo.md:
        title: Informations sur la traduction
menu:
    Accueil: index.html
    Liste des profils: liste_profils.html
    API MSSanté: balmss-spec.html
    Ressources de conformité: artifacts.html
    Documentations: 
        Documentation des IGs: new-tab https://interop.esante.gouv.fr/ig/documentation/
        Documentation de l'API: https://ansforge.github.io/annuaire-sante-fhir-documentation/
        Code source de l'API: https://github.com/ansforge/annuaire-sante-fhir-serveur
        Issue sur l'API: https://github.com/ansforge/annuaire-sante-fhir-serveur/issues
        Issue sur l'IG: https://github.com/ansforge/annuaire-sante-fhir-documentation/issues
        Téléchargement du guide: downloads.html
    Problématiques connues: problematiques_connues.html
    Historique: changes.html
