                                        - system: https://mos.esante.gouv.fr/NOS/TRE_R256-TypeMessagerie/FHIR/TRE-R256-TypeMessagerie
                                          code: PER
                                  - url: listeRouge
                                    valueBoolean: false
              replaceAttribute:
                summary: Mise à jour d'un seul attribut (listeRouge)
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "PractitionerRole.telecom.where(value = 'prenom.nom@domain.mssante.fr').extension('https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata').extension('listeRouge').value"
                        - name: value
