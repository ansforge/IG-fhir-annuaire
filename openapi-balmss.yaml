              insertBAL:
                summary: Ajout d'une nouvelle BAL PER
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: insert
                        - name: path
                          valueString: PractitionerRole.telecom
                        - name: index
