components:

  parameters:

    resourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Identifiant logique de la ressource FHIR récupéré de l'API FHIR Annuaire Santé

    mailboxMssType:
      name: mailbox-mss-type
      in: query
      required: false
      schema:
        type: string
        example: "https://mos.esante.gouv.fr/NOS/TRE_R256-TypeMessagerie/FHIR/TRE-R256-TypeMessagerie|PER"
      description: |
        Filtre par type de BAL. Format `système|code`.
        Valeurs : `PER`, `ORG`, `APP`, `CAB`.
        **Non encore implémenté sur le serveur.**

    mailboxMss:
      name: mailbox-mss
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/MailboxMssAddress'
      description: |
        Filtre par adresse MSSanté au format `*@*.mssante.fr`.
        Modificateurs supportés : `:contains`, `:exact`.

    elements:
      name: _elements
      in: query
      required: false
      schema:
        type: string
        example: identifier,telecom
      description: |
        Restreint la réponse aux champs listés (séparés par des virgules).
        Le serveur ajoute `meta.tag = SUBSETTED` pour signaler que la ressource est incomplète.
        **Déjà implémenté sur le serveur.**

    count:
      name: _count
      in: query
      required: false
      schema:
        type: integer
        default: 50
      description: Nombre maximum de résultats par page

    pageToken:
      name: _page_token
      in: query
      required: false
      schema:
        type: string
      description: Token de pagination fourni dans le lien `next` du Bundle de réponse

  schemas:

    Bundle:
      type: object
      description: Bundle FHIR de type searchset
      properties:
        resourceType:
          type: string
          enum: [ Bundle ]
        type:
          type: string
          enum: [ searchset ]
        total:
          type: integer
        link:
          type: array
          items:
            type: object
            properties:
              relation:
                type: string
                enum: [ self, next, previous ]
              url:
                type: string
        entry:
          type: array
          items:
            type: object
            properties:
              fullUrl:
                type: string
              resource:
                type: object
                description: Ressource FHIR (Practitioner, PractitionerRole ou Organization)

    Practitioner:
      type: object
      description: Ressource FHIR Practitioner (profil AS Practitioner)
      properties:
        resourceType:
          type: string
          enum: [ Practitioner ]
        id:
          type: string
        identifier:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/MailboxMSS'

    PractitionerRole:
      type: object
      description: Ressource FHIR PractitionerRole (profil AS PractitionerRole)
      properties:
        resourceType:
          type: string
          enum: [ PractitionerRole ]
        id:
          type: string
        identifier:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/MailboxMSS'

    Organization:
      type: object
      description: Ressource FHIR Organization (profil AS Organization)
      properties:
        resourceType:
          type: string
          enum: [ Organization ]
        id:
          type: string
        identifier:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/MailboxMSS'

    Identifier:
      type: object
      properties:
        system:
          type: string
        value:
          type: string

    MailboxMSS:
      type: object
      description: ContactPoint représentant une BAL MSSanté (profil AS Mailbox MSS)
      properties:
        system:
          type: string
          enum: [ email ]
        value:
          $ref: '#/components/schemas/MailboxMssAddress'
        rank:
          type: integer
          minimum: 1
          description: |
            Ordre de préférence de la BAL parmi les ContactPoints de la ressource.
            La valeur `1` correspond à la priorité la plus haute (BAL préférentielle).
            Conforme à l'élément `ContactPoint.rank` de FHIR R4.
          example: 1
        extension:
          type: array
          items:
            $ref: '#/components/schemas/MailboxMSSMetadata'

    MailboxMSSMetadata:
      type: object
      description: Extension as-ext-mailbox-mss-metadata
      properties:
        url:
          type: string
          enum: [ https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata ]
        extension:
          type: array
          description: Attributs de la BAL
          items:
            type: object
            properties:
              url:
                type: string
                enum: [ type, listeRouge, description, service, responsible ]
              valueCode:
                type: string
                description: Valeur pour les extensions de type code BAL
                enum: [ PER, ORG, APP, CAB ]
              valueBoolean:
                type: boolean
                description: Valeur pour les extensions booléennes (listeRouge)
              valueString:
                type: string
                description: Valeur pour les extensions textuelles (description, service, responsible)

    MailboxMssAddress:
      type: string
      format: email
      pattern: '^[^@\s]+@([^@\s]+\.mssante\.fr|interop-mssante\.apicrypt\.org)$'
      description: Adresse MSSanté au format `*@*.mssante.fr` ou `*@interop-mssante.apicrypt.org`
      example: prenom.nom@domain.mssante.fr ou prenom.nom@interop-mssante.apicrypt.org

    PatchParameters:
      type: object
      description: Ressource FHIR Parameters pour une opération FHIR Patch (https://hl7.org/fhir/R4/fhirpatch.html)
      required: [ resourceType, parameter ]
      properties:
        resourceType:
          type: string
          enum: [ Parameters ]
        parameter:
          type: array
          minItems: 1
          items:
            type: object
            required: [ name, part ]
            properties:
              name:
                type: string
                enum: [ operation ]
              part:
                type: array
                description: Parties de l'opération FHIR Patch
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      enum: [ type, path, index, value ]
                    valueCode:
                      type: string
                      enum: [ replace, insert, delete ]
                      description: Type d'opération (pour name=type)
                    valueString:
                      type: string
                      description: Expression FHIRPath (pour name=path) ou valeur textuelle (pour name=value)
                    valueBoolean:
                      type: boolean
                      description: Valeur booléenne (pour name=value)
                    valueInteger:
                      type: integer
                      minimum: 0
                      description: Position d'insertion (pour name=index) ou rang de priorité de la BAL (pour name=value, opération replace sur `telecom.rank`)
                    valueContactPoint:
                      $ref: '#/components/schemas/MailboxMSS'

    OperationOutcome:
      type: object
      properties:
        resourceType:
          type: string
          enum: [ OperationOutcome ]
        issue:
          type: array
          items:
            type: object
            properties:
              severity:
                type: string
                enum: [ error, warning, information ]
              code:
                type: string
              details:
                type: object
                properties:
                  text:
                    type: string

  responses:
    BadRequest:
      description: Requête invalide (paramètre manquant ou malformé)
      content:
        application/fhir+json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'
    Unauthorized:
      description: Authentification requise
      content:
        application/fhir+json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'
    NotFound:
      description: Ressource introuvable
      content:
        application/fhir+json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'
    PreconditionFailed:
      description: |
        Précondition non satisfaite — le PATCH conditionnel a retourné plusieurs ressources
        correspondant aux critères de recherche (comportement ambigu).
        Le serveur refuse d'appliquer le patch ; l'appelant doit affiner les critères
        ou utiliser un PATCH par identifiant logique (`/{id}`).
      content:
        application/fhir+json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'
          example:
            resourceType: OperationOutcome
            issue:
              - severity: error
                code: conflict
                details:
                  text: >
                    Multiple matches found for conditional PATCH — 0 or 1 match required,
                    but the search returned more than one result.

  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: ESANTE-API-KEY
      description: Clé d'API fournie par l'ANS pour accéder à l'API Annuaire Santé

security:
  - ApiKey: [ ]
