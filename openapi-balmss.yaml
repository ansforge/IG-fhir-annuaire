      description: |
        **Non encore implémenté — comportement attendu.**

        FHIR PATCH conditionnel sur un `PractitionerRole` identifié par le RPPS du praticien
        et l'identifiant de la structure d'exercice (FINESS ou SIREN).
        Le serveur résout la ressource cible via les paramètres de recherche avant d'appliquer le patch.

        **Données modifiables :**

        _La valeur de l'opération est portée par `parameter.part.where(name = 'type').valueCode` dans le body._

        | Opération | Description |
        |-----------|-------------|
        | `replace`  | Remplacer le ContactPoint entier ou un attribut de l'extension |
        | `insert`   | Ajouter une nouvelle BAL |
        | `delete`   | Supprimer une BAL existante |

        _Le chemin de la donnée est porté par `parameter.part.where(name = 'path').valueString` dans le body._

        | Donnée | PER | Chemin FHIR |
        |--------|:---:|-------------|
        | Adresse BAL | ✓ | `telecom.value` |
        | Type de BAL | ✓ | `telecom.extension[as-mailbox-mss-metadata].extension[type]` |
        | Liste rouge | ✓ | `telecom.extension[as-mailbox-mss-metadata].extension[listeRouge]` |
        | BAL préférentielle | ✓ | `telecom.rank` (1 = priorité la plus haute) |
        | Identifiant PP (RPPS) | ✓ | `PractitionerRole.practitioner` (référence) |
        | Identifiant de structure | ✓ | `PractitionerRole.organization` (référence) |
      operationId: patchPractitionerRoleBALByIdentifier
      parameters:
        - name: practitioner.identifier
          in: query
          required: true
          schema:
            type: string
            example: "urn:oid:1.2.250.1.71.4.2.1|800012345678"
          description: |
            Identifiant du praticien. Systèmes supportés :
            - `https://rpps.esante.gouv.fr|{NUM_RPPS}`
            - `urn:oid:1.2.250.1.71.4.2.1|{IDNAT_PP}` (IdNatPP — identifiant national PP)
        - name: organization.identifier
          in: query
          required: true
          schema:
            type: string
            example: "http://finess.sante.gouv.fr|123456789"
          description: |
            Identifiant de la structure d'exercice. Systèmes supportés :
            - `http://finess.sante.gouv.fr|{NUM_FINESS}`
            - `http://sirene.fr|{NUM_SIREN}`
