openapi: 3.0.3
info:
  title: API FHIR Annuaire Santé — BAL MSSanté
  description: |
    Spécification des endpoints FHIR de l'Annuaire Santé relatifs aux boîtes aux lettres
    du service de messagerie sécurisée de santé (BAL MSSanté).

    Les BAL sont modélisées via l'élément `telecom` (profil AS Mailbox MSS) des ressources
    `Practitioner`, `PractitionerRole` et `Organization`.

    | Type | Ressource(s) porteuse(s) |
    |------|--------------------------|
    | PER  | `Practitioner` (RPPS seul), `PractitionerRole` (RPPS + structure) |
    | ORG  | `Organization` |
    | APP  | `Organization` |
    | CAB  | `Practitioner` |

    **Les opérations d'écriture (PATCH) sont décrites à titre prospectif — l'API est actuellement en lecture seule.**
  version: draft
  contact:
    name: ANS — Agence du Numérique en Santé
    url: https://esante.gouv.fr

servers:
  - url: https://gateway.api.esante.gouv.fr/fhir
    description: API FHIR Annuaire Santé (production)

tags:
  - name: Récupération
    description: Lecture des BAL MSSanté
  - name: Écriture
    description: Création, mise à jour et suppression des BAL MSSanté (non encore implémenté)

paths:

  /Practitioner:
    get:
      tags: [Récupération]
      summary: Rechercher des BAL PER (RPPS seul) ou CAB
      description: |
        Retourne les ressources `Practitioner` portant des BAL MSSanté de type `PER`
        (rattachées à un identifiant RPPS seul) ou `CAB`.

        Le paramètre `mailbox-mss-type` est défini dans le SearchParameter
        [`as-sp-mailbox-mss-type`](https://interop.esante.gouv.fr/ig/fhir/annuaire/SearchParameter-as-sp-mailbox-mss-type.html).
        **Non encore implémenté sur le serveur** (PR #296, ajouté le 25/03/2026).
      operationId: searchPractitionerBAL
      parameters:
        - $ref: '#/components/parameters/mailboxMssType'
        - $ref: '#/components/parameters/mailboxMss'
        - $ref: '#/components/parameters/elements'
        - $ref: '#/components/parameters/count'

      responses:
        '200':
          description: Bundle searchset contenant les Practitioner correspondants
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
              example:
                resourceType: Bundle
                type: searchset
                total: 2
                entry:
                  - resource:
                      resourceType: Practitioner
                      id: practitioner-dupont
                      identifier:
                        - system: urn:oid:1.2.250.1.71.4.2.1
                          value: "800012345678"
                      telecom:
                        - system: email
                          value: jean.dupont@domain.mssante.fr
                          extension:
                            - url: https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata
                              extension:
                                - url: type
                                  valueCode: PER
                                - url: listeRouge
                                  valueBoolean: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /PractitionerRole:
    get:
      tags: [Récupération]
      summary: Rechercher des BAL PER (RPPS + structure d'exercice)
      description: |
        Retourne les ressources `PractitionerRole` portant des BAL MSSanté de type `PER`
        rattachées à un RPPS et une structure d'exercice.
      operationId: searchPractitionerRoleBAL
      parameters:
        - $ref: '#/components/parameters/mailboxMssType'
        - $ref: '#/components/parameters/mailboxMss'
        - $ref: '#/components/parameters/elements'
        - $ref: '#/components/parameters/count'

      responses:
        '200':
          description: Bundle searchset contenant les PractitionerRole correspondants
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /Organization:
    get:
      tags: [Récupération]
      summary: Rechercher des BAL ORG ou APP
      description: |
        Retourne les ressources `Organization` portant des BAL MSSanté de type `ORG` ou `APP`.
      operationId: searchOrganizationBAL
      parameters:
        - $ref: '#/components/parameters/mailboxMssType'
        - $ref: '#/components/parameters/mailboxMss'
        - $ref: '#/components/parameters/elements'
        - $ref: '#/components/parameters/count'

      responses:
        '200':
          description: Bundle searchset contenant les Organization correspondantes
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /:
    get:
      tags: [Récupération]
      summary: Recherche multi-ressources via _type
      description: |
        Permet d'interroger plusieurs types de ressources simultanément via `_type`.
        Utile pour récupérer en un seul appel les BAL PER portées par `Practitioner`
        et `PractitionerRole`.
      operationId: searchMultiTypeBAL
      parameters:
        - name: _type
          in: query
          required: true
          schema:
            type: string
            example: Practitioner,PractitionerRole
          description: Types de ressources à interroger, séparés par des virgules
        - $ref: '#/components/parameters/mailboxMssType'
        - $ref: '#/components/parameters/mailboxMss'
        - $ref: '#/components/parameters/elements'
        - $ref: '#/components/parameters/count'
      responses:
        '200':
          description: Bundle searchset contenant les ressources correspondantes
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Bundle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /Practitioner/{id}:
    patch:
      tags: [Écriture]
      summary: Modifier, créer ou supprimer une BAL PER/CAB sur un Practitioner
      description: |
        **Non encore implémenté — comportement attendu.**

        FHIR PATCH sur un `Practitioner` pour agir sur un élément `telecom` BAL MSSanté.

        | Opération | Description |
        |-----------|-------------|
        | `replace`  | Remplacer le ContactPoint entier ou un attribut de l'extension |
        | `insert`   | Ajouter une nouvelle BAL |
        | `delete`   | Supprimer une BAL existante |
      operationId: patchPractitionerBAL
      parameters:
        - $ref: '#/components/parameters/resourceId'
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/PatchParameters'
            examples:
              replaceContactPoint:
                summary: Mise à jour de plusieurs attributs (ContactPoint complet)
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "Practitioner.telecom.where(value = 'prenom.nom@domain.mssante.fr')"
                        - name: value
                          valueContactPoint:
                            system: email
                            value: prenom.nom@domain.mssante.fr
                            extension:
                              - url: https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata
                                extension:
                                  - url: type
                                    valueCode: PER
                                  - url: listeRouge
                                    valueBoolean: true
              replaceAttribute:
                summary: Mise à jour d'un seul attribut (listeRouge)
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "Practitioner.telecom.where(value = 'prenom.nom@domain.mssante.fr').extension('https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata').extension('listeRouge').value"
                        - name: value
                          valueBoolean: true
              insertBAL:
                summary: Ajout d'une nouvelle BAL PER
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: insert
                        - name: path
                          valueString: Practitioner.telecom
                        - name: index
                          valueInteger: 0
                        - name: value
                          valueContactPoint:
                            system: email
                            value: prenom.nom@domain.mssante.fr
                            extension:
                              - url: https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata
                                extension:
                                  - url: type
                                    valueCode: PER
                                  - url: listeRouge
                                    valueBoolean: false
              deleteBAL:
                summary: Suppression d'une BAL PER
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: delete
                        - name: path
                          valueString: "Practitioner.telecom.where(value = 'prenom.nom@domain.mssante.fr')"
      responses:
        '200':
          description: Ressource mise à jour avec succès
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Practitioner'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /PractitionerRole/{id}:
    patch:
      tags: [Écriture]
      summary: Modifier, créer ou supprimer une BAL PER sur un PractitionerRole
      description: |
        **Non encore implémenté — comportement attendu.**

        Identique à `PATCH /Practitioner/{id}`, pour les BAL PER rattachées à un RPPS + structure.
      operationId: patchPractitionerRoleBAL
      parameters:
        - $ref: '#/components/parameters/resourceId'
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/PatchParameters'
            examples:
              replaceContactPoint:
                summary: Mise à jour de plusieurs attributs (ContactPoint complet)
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "PractitionerRole.telecom.where(value = 'prenom.nom@domain.mssante.fr')"
                        - name: value
                          valueContactPoint:
                            system: email
                            value: prenom.nom@domain.mssante.fr
                            extension:
                              - url: https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata
                                extension:
                                  - url: type
                                    valueCode: PER
                                  - url: listeRouge
                                    valueBoolean: false
      responses:
        '200':
          description: Ressource mise à jour avec succès
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/PractitionerRole'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /Organization/{id}:
    patch:
      tags: [Écriture]
      summary: Modifier, créer ou supprimer une BAL ORG ou APP sur une Organization
      description: |
        **Non encore implémenté — comportement attendu.**

        FHIR PATCH sur une `Organization` pour les BAL de type `ORG` ou `APP`.
      operationId: patchOrganizationBAL
      parameters:
        - $ref: '#/components/parameters/resourceId'
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/PatchParameters'
            examples:
              replaceContactPoint:
                summary: Mise à jour de plusieurs attributs (ContactPoint complet)
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "Organization.telecom.where(value = 'structure@domain.mssante.fr')"
                        - name: value
                          valueContactPoint:
                            system: email
                            value: structure@domain.mssante.fr
                            extension:
                              - url: https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata
                                extension:
                                  - url: type
                                    valueCode: ORG
                                  - url: listeRouge
                                    valueBoolean: false
                                  - url: description
                                    valueString: BAL principale de la structure
              replaceAttribute:
                summary: Mise à jour de la description uniquement
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "Organization.telecom.where(value = 'structure@domain.mssante.fr').extension('https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata').extension('description').value"
                        - name: value
                          valueString: BAL principale de la structure
              insertBAL:
                summary: Ajout d'une nouvelle BAL ORG
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: insert
                        - name: path
                          valueString: Organization.telecom
                        - name: index
                          valueInteger: 0
                        - name: value
                          valueContactPoint:
                            system: email
                            value: structure@domain.mssante.fr
                            extension:
                              - url: https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata
                                extension:
                                  - url: type
                                    valueCode: ORG
                                  - url: listeRouge
                                    valueBoolean: false
                                  - url: description
                                    valueString: BAL principale de la structure
              deleteBAL:
                summary: Suppression d'une BAL ORG
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: delete
                        - name: path
                          valueString: "Organization.telecom.where(value = 'structure@domain.mssante.fr')"
      responses:
        '200':
          description: Ressource mise à jour avec succès
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:

  parameters:

    resourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Identifiant logique de la ressource FHIR

    mailboxMssType:
      name: mailbox-mss-type
      in: query
      required: false
      schema:
        type: string
        example: "https://mos.esante.gouv.fr/NOS/TRE_R256-TypeMessagerie/FHIR/TRE-R256-TypeMessagerie|PER"
      description: |
        Filtre par type de BAL. Format `système|code`.
        Valeurs : `PER`, `ORG`, `APP`, `CAB`.
        **Non encore implémenté sur le serveur.**

    mailboxMss:
      name: mailbox-mss
      in: query
      required: false
      schema:
        type: string
        example: prenom.nom@domain.mssante.fr
      description: |
        Filtre par adresse MSSanté.
        Modificateurs supportés : `:contains`, `:exact`.

    elements:
      name: _elements
      in: query
      required: false
      schema:
        type: string
        example: identifier,telecom
      description: |
        Restreint la réponse aux champs listés (séparés par des virgules).
        Le serveur ajoute `meta.tag = SUBSETTED` pour signaler que la ressource est incomplète.
        **Déjà implémenté sur le serveur.**

    count:
      name: _count
      in: query
      required: false
      schema:
        type: integer
        default: 50
      description: Nombre maximum de résultats par page


  schemas:

    Bundle:
      type: object
      description: Bundle FHIR de type searchset
      properties:
        resourceType:
          type: string
          enum: [Bundle]
        type:
          type: string
          enum: [searchset]
        total:
          type: integer
        link:
          type: array
          items:
            type: object
            properties:
              relation:
                type: string
                enum: [self, next, previous]
              url:
                type: string
        entry:
          type: array
          items:
            type: object
            properties:
              fullUrl:
                type: string
              resource:
                type: object
                description: Ressource FHIR (Practitioner, PractitionerRole ou Organization)

    Practitioner:
      type: object
      description: Ressource FHIR Practitioner (profil AS Practitioner)
      properties:
        resourceType:
          type: string
          enum: [Practitioner]
        id:
          type: string
        identifier:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/MailboxMSS'

    PractitionerRole:
      type: object
      description: Ressource FHIR PractitionerRole (profil AS PractitionerRole)
      properties:
        resourceType:
          type: string
          enum: [PractitionerRole]
        id:
          type: string
        identifier:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/MailboxMSS'

    Organization:
      type: object
      description: Ressource FHIR Organization (profil AS Organization)
      properties:
        resourceType:
          type: string
          enum: [Organization]
        id:
          type: string
        identifier:
          type: array
          items:
            $ref: '#/components/schemas/Identifier'
        telecom:
          type: array
          items:
            $ref: '#/components/schemas/MailboxMSS'

    Identifier:
      type: object
      properties:
        system:
          type: string
        value:
          type: string

    MailboxMSS:
      type: object
      description: ContactPoint représentant une BAL MSSanté (profil AS Mailbox MSS)
      properties:
        system:
          type: string
          enum: [email]
        value:
          type: string
          description: Adresse MSSanté
          example: prenom.nom@domain.mssante.fr
        extension:
          type: array
          items:
            $ref: '#/components/schemas/MailboxMSSMetadata'

    MailboxMSSMetadata:
      type: object
      description: Extension as-ext-mailbox-mss-metadata
      properties:
        url:
          type: string
          enum: [https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata]
        extension:
          type: array
          description: Attributs de la BAL
          items:
            type: object
            properties:
              url:
                type: string
                enum: [type, listeRouge, description, service, responsible]
              valueCode:
                type: string
                description: Valeur pour les extensions de type code (ex. type de BAL)
                enum: [PER, ORG, APP, CAB]
              valueBoolean:
                type: boolean
                description: Valeur pour les extensions booléennes (listeRouge)
              valueString:
                type: string
                description: Valeur pour les extensions textuelles (description, service, responsible)

    PatchParameters:
      type: object
      description: Ressource FHIR Parameters pour une opération FHIR Patch (https://hl7.org/fhir/R4/fhirpatch.html)
      required: [resourceType, parameter]
      properties:
        resourceType:
          type: string
          enum: [Parameters]
        parameter:
          type: array
          minItems: 1
          items:
            type: object
            required: [name, part]
            properties:
              name:
                type: string
                enum: [operation]
              part:
                type: array
                description: Parties de l'opération FHIR Patch
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      enum: [type, path, index, value]
                    valueCode:
                      type: string
                      enum: [replace, insert, delete]
                      description: Type d'opération (pour name=type)
                    valueString:
                      type: string
                      description: Expression FHIRPath (pour name=path) ou valeur textuelle (pour name=value)
                    valueBoolean:
                      type: boolean
                      description: Valeur booléenne (pour name=value)
                    valueInteger:
                      type: integer
                      minimum: 0
                      description: Position d'insertion (pour name=index, opération insert uniquement)
                    valueContactPoint:
                      $ref: '#/components/schemas/MailboxMSS'

    OperationOutcome:
      type: object
      properties:
        resourceType:
          type: string
          enum: [OperationOutcome]
        issue:
          type: array
          items:
            type: object
            properties:
              severity:
                type: string
                enum: [error, warning, information]
              code:
                type: string
              details:
                type: object
                properties:
                  text:
                    type: string

  responses:
    BadRequest:
      description: Requête invalide (paramètre manquant ou malformé)
      content:
        application/fhir+json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'
    Unauthorized:
      description: Authentification requise
      content:
        application/fhir+json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'
    NotFound:
      description: Ressource introuvable
      content:
        application/fhir+json:
          schema:
            $ref: '#/components/schemas/OperationOutcome'

  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: ESANTE-API-KEY
      description: Clé d'API fournie par l'ANS pour accéder à l'API Annuaire Santé

security:
  - ApiKey: []
