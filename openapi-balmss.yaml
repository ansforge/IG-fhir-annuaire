  /Organization/{id}:
    patch:
      tags: [ FHIR PATCH ]
      summary: Modifier, créer ou supprimer une BAL ORG ou APP sur une Organization
      description: |
        **Non encore implémenté — comportement attendu.**

        FHIR PATCH sur une `Organization` pour agir sur un élément `telecom` BAL MSSanté de type `ORG` ou `APP`.

        **Données modifiables :**

        _La valeur de l'opération est portée par `parameter.part.where(name = 'type').valueCode` dans le body._

        | Opération | Description |
        |-----------|-------------|
        | `replace`  | Remplacer le ContactPoint entier ou un attribut de l'extension |
        | `insert`   | Ajouter une nouvelle BAL |
        | `delete`   | Supprimer une BAL existante |


        _Le chemin de la donnée est porté par `parameter.part.where(name = 'path').valueString` dans le body._

        | Donnée | ORG | APP | Chemin FHIR |
        |--------|:---:|:---:|-------------|
        | Adresse BAL | ✓ | ✓ | `telecom.value` |
        | Type de BAL | ✓ | ✓ | `telecom.extension[as-mailbox-mss-metadata].extension[type]` |
        | Liste rouge | ✓ | ✓ | `telecom.extension[as-mailbox-mss-metadata].extension[listeRouge]` |
        | Description | ✓ | ✓ | `telecom.extension[as-mailbox-mss-metadata].extension[description]` |
        | Service de rattachement | ✓ | ✓ | `telecom.extension[as-mailbox-mss-metadata].extension[service]` |
        | Responsable | ✓ | ✓ | `telecom.extension[as-mailbox-mss-metadata].extension[responsible]` |
        | BAL préférentielle | ✓ | ✓ | `telecom.rank` (1 = priorité la plus haute) |
        | Identifiant national de structure | ✓ | ✓ | `Organization.identifier` |
      operationId: patchOrganizationBAL
      parameters:
        - $ref: '#/components/parameters/resourceId'
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/PatchParameters'
            examples:
              replaceContactPoint:
                summary: Mise à jour de plusieurs attributs (ContactPoint complet)
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "Organization.telecom.where(value = 'structure@domain.mssante.fr')"
                        - name: value
                          valueContactPoint:
                            system: email
                            value: structure@domain.mssante.fr
                            rank: 1
                            extension:
                              - url: https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata
                                extension:
                                  - url: type
                                    valueCodeableConcept:
                                      coding:
                                        - system: https://mos.esante.gouv.fr/NOS/TRE_R256-TypeMessagerie/FHIR/TRE-R256-TypeMessagerie
                                          code: ORG
                                  - url: listeRouge
                                    valueBoolean: false
                                  - url: description
                                    valueString: BAL principale de la structure
              replaceAttribute:
                summary: Mise à jour de la description uniquement
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "Organization.telecom.where(value = 'structure@domain.mssante.fr').extension('https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata').extension('description').value"
                        - name: value
                          valueString: BAL principale de la structure
              replaceRank:
                summary: Mise à jour du rang (BAL préférentielle)
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "Organization.telecom.where(value = 'structure@domain.mssante.fr').rank"
                        - name: value
                          valueInteger: 1
              insertBAL:
                summary: Ajout d'une nouvelle BAL ORG
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: insert
                        - name: path
                          valueString: Organization.telecom
                        - name: index
                          valueInteger: 0
                        - name: value
                          valueContactPoint:
                            system: email
                            value: structure@domain.mssante.fr
                            rank: 1
                            extension:
                              - url: https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata
                                extension:
                                  - url: type
                                    valueCodeableConcept:
                                      coding:
                                        - system: https://mos.esante.gouv.fr/NOS/TRE_R256-TypeMessagerie/FHIR/TRE-R256-TypeMessagerie
                                          code: ORG
                                  - url: listeRouge
                                    valueBoolean: false
                                  - url: description
                                    valueString: BAL principale de la structure
                                  - url: service
                                    valueString: Service des admissions
                                  - url: responsible
                                    valueString: Responsable de la BAL
              deleteBAL:
                summary: Suppression d'une BAL ORG
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: delete
                        - name: path
                          valueString: "Organization.telecom.where(value = 'structure@domain.mssante.fr')"
      responses:
        '200':
          description: Ressource mise à jour avec succès
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /Practitioner:
