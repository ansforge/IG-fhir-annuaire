openapi: 3.0.3
info:
  title: API FHIR MSS - Boîtes aux lettres MSSanté de l'Annuaire Santé
  description: |
    Spécification des endpoints FHIR de l'Annuaire Santé relatifs aux boîtes aux lettres
    du service de messagerie sécurisée de santé (BAL MSSanté).

    Les BAL sont modélisées via l'élément `telecom` (profil AS Mailbox MSS) des ressources
    `Practitioner`, `PractitionerRole` et `Organization`.

    | Type | Ressource(s) porteuse(s) |
    |------|--------------------------|
    | PER  | `Practitioner` (RPPS seul), `PractitionerRole` (RPPS + structure) |
    | ORG  | `Organization` |
    | APP  | `Organization` |
    | CAB  | `Practitioner` |

    **Ce swagger se concentre uniquement sur les fonctionnalités d'interaction des balmss.**
  version: draft
  contact:
    name: ANS — Agence du Numérique en Santé
    url: https://esante.gouv.fr

servers:
  - url: https://gateway.api.esante.gouv.fr/a/definir
    description: API FHIR MSS (non encore implémenté)

tags:
  - name: Récupération
    description: Lecture des BAL MSSanté via l'API FHIR MSS (non encore implémenté)
  - name: FHIR PATCH
    description: Création, mise à jour et suppression des BAL MSSanté via l'API FHIR MSS (non encore implémenté)
  - name: FHIR PATCH Conditionnel
    description: Création, mise à jour et suppression des BAL MSSanté via l'API FHIR MSS (non encore implémenté)

paths:

  /Practitioner/{id}:
    patch:
      tags: [ FHIR PATCH ]
      summary: Modifier, créer ou supprimer une BAL PER/CAB sur un Practitioner
      description: |
        **Non encore implémenté — comportement attendu.**

        FHIR PATCH sur un `Practitioner` pour agir sur un élément `telecom` BAL MSSanté.

        **Données modifiables :**

        _La valeur de l'opération est portée par `parameter.part.where(name = 'type').valueCode` dans le body._

        | Opération | Description |
        |-----------|-------------|
        | `replace`  | Remplacer le ContactPoint entier ou un attribut de l'extension |
        | `insert`   | Ajouter une nouvelle BAL |
        | `delete`   | Supprimer une BAL existante |


        _Le chemin de la donnée est porté par `parameter.part.where(name = 'path').valueString` dans le body._

        | Donnée | PER | CAB | Chemin FHIR |
        |--------|:---:|:---:|-------------|
        | Adresse BAL | ✓ | ✓ | `telecom.value` |
        | Type de BAL | ✓ | ✓ | `telecom.extension[as-mailbox-mss-metadata].extension[type]` |
        | Liste rouge | ✓ | ✓ | `telecom.extension[as-mailbox-mss-metadata].extension[listeRouge]` |
        | Description | — | ✓ | `telecom.extension[as-mailbox-mss-metadata].extension[description]` |
        | Responsable | — | ✓ | `telecom.extension[as-mailbox-mss-metadata].extension[responsible]` |
        | BAL préférentielle | ✓ | ✓ | `telecom.rank` (1 = priorité la plus haute) |
        | Identifiant PP (RPPS) | ✓ | ✓ | `Practitioner.identifier` |
      operationId: patchPractitionerBAL
      parameters:
        - $ref: '#/components/parameters/resourceId'
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              $ref: '#/components/schemas/PatchParameters'
            examples:
              replaceBALPERContactPoint:
                summary: Mise à jour de plusieurs attributs (ContactPoint complet) BAL PER
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "Practitioner.telecom.where(value = 'prenom.nom@domain.mssante.fr')"
                        - name: value
                          valueContactPoint:
                            system: email
                            value: prenom.nom@domain.mssante.fr
                            rank: 1
                            extension:
                              - url: https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata
                                extension:
                                  - url: type
                                    valueCodeableConcept:
                                      coding:
                                        - system: https://mos.esante.gouv.fr/NOS/TRE_R256-TypeMessagerie/FHIR/TRE-R256-TypeMessagerie
                                          code: PER
                                  - url: listeRouge
                                    valueBoolean: true
              replaceBALPERAttribute:
                summary: Mise à jour d'un seul attribut (listeRouge) BAL PER
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "Practitioner.telecom.where(value = 'prenom.nom@domain.mssante.fr').extension('https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata').extension('listeRouge').value"
                        - name: value
                          valueBoolean: true
              replaceRankBALPER:
                summary: Mise à jour du rang BAL PER (BAL préférentielle)
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "Practitioner.telecom.where(value = 'prenom.nom@domain.mssante.fr').rank"
                        - name: value
                          valueInteger: 1
              insertBALPER:
                summary: Ajout d'une nouvelle BAL PER
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: insert
                        - name: path
                          valueString: Practitioner.telecom
                        - name: index
                          valueInteger: 0
                        - name: value
                          valueContactPoint:
                            system: email
                            value: prenom.nom@domain.mssante.fr
                            rank: 1
                            extension:
                              - url: https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata
                                extension:
                                  - url: type
                                    valueCodeableConcept:
                                      coding:
                                        - system: https://mos.esante.gouv.fr/NOS/TRE_R256-TypeMessagerie/FHIR/TRE-R256-TypeMessagerie
                                          code: PER
                                  - url: listeRouge
                                    valueBoolean: false
              deleteBALPER:
                summary: Suppression d'une BAL CAB
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: delete
                        - name: path
                          valueString: "Practitioner.telecom.where(value = 'prenom.nom@domain.mssante.fr')"
              replaceBALCABContactPoint:
                summary: Mise à jour de plusieurs attributs (ContactPoint complet) BAL CAB
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "Practitioner.telecom.where(value = 'prenom.nom@domain.mssante.fr')"
                        - name: value
                          valueContactPoint:
                            system: email
                            value: prenom.nom@domain.mssante.fr
                            rank: 1
                            extension:
                              - url: https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata
                                extension:
                                  - url: type
                                    valueCodeableConcept:
                                      coding:
                                        - system: https://mos.esante.gouv.fr/NOS/TRE_R256-TypeMessagerie/FHIR/TRE-R256-TypeMessagerie
                                          code: CAB
                                  - url: listeRouge
                                    valueBoolean: true
              replaceBALCABAttribute:
                summary: Mise à jour d'un seul attribut (listeRouge) BAL CAB
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "Practitioner.telecom.where(value = 'prenom.nom@domain.mssante.fr').extension('https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata').extension('listeRouge').value"
                        - name: value
                          valueBoolean: true
              replaceRankBALCAB:
                summary: Mise à jour du rang BAL CAB (BAL préférentielle)
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: replace
                        - name: path
                          valueString: "Practitioner.telecom.where(value = 'prenom.nom@domain.mssante.fr').rank"
                        - name: value
                          valueInteger: 1
              insertBALCAB:
                summary: Ajout d'une nouvelle BAL CAB
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: insert
                        - name: path
                          valueString: Practitioner.telecom
                        - name: index
                          valueInteger: 0
                        - name: value
                          valueContactPoint:
                            system: email
                            value: prenom.nom@domain.mssante.fr
                            rank: 1
                            extension:
                              - url: https://interop.esante.gouv.fr/ig/fhir/annuaire/StructureDefinition/as-ext-mailbox-mss-metadata
                                extension:
                                  - url: type
                                    valueCodeableConcept:
                                      coding:
                                        - system: https://mos.esante.gouv.fr/NOS/TRE_R256-TypeMessagerie/FHIR/TRE-R256-TypeMessagerie
                                          code: CAB
                                  - url: listeRouge
                                    valueBoolean: false
              deleteBALCAB:
                summary: Suppression d'une BAL CAB
                value:
                  resourceType: Parameters
                  parameter:
                    - name: operation
                      part:
                        - name: type
                          valueCode: delete
                        - name: path
                          valueString: "Practitioner.telecom.where(value = 'prenom.nom@domain.mssante.fr')"
      responses:
        '200':
          description: Ressource mise à jour avec succès
          content:
            application/fhir+json:
              schema:
                $ref: '#/components/schemas/Practitioner'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

