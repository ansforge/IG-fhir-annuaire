      tags: [ FHIR PATCH Conditionnel ]
      summary: Modifier, créer ou supprimer une BAL PER/CAB sur un Practitioner (recherche par identifiant)
      description: |
        **Non encore implémenté — comportement attendu.**

        FHIR PATCH conditionnel sur un `Practitioner` identifié par son numéro RPPS.
        Le serveur résout la ressource cible via le paramètre de recherche `identifier` avant d'appliquer le patch.

        **Données modifiables :**

        _La valeur de l'opération est portée par `parameter.part.where(name = 'type').valueCode` dans le body._

        | Opération | Description |
        |-----------|-------------|
        | `replace`  | Remplacer le ContactPoint entier ou un attribut de l'extension |
        | `insert`   | Ajouter une nouvelle BAL |
        | `delete`   | Supprimer une BAL existante |

